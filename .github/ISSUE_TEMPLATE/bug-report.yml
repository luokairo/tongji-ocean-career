name: 🐛 站点问题 / 内容错误反馈
description: 报告错别字、链接失效、信息错误等
title: "[反馈] "
labels: ["bug"]
body:
  - type: dropdown
    id: type
    attributes:
      label: 问题类型
      options:
        - 错别字 / 表述不清
        - 链接失效
        - 信息错误（请描述正确信息）
        - 排版 / 显示问题
        - 站点功能异常（搜索、评论等）
        - 其他
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: 出问题的页面 URL 或路径
      placeholder: "/companies/soe 或完整 URL"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 详细描述
      description: 如果是内容错误，请同时给出正确信息或可信来源
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: 环境（可选）
      description: 浏览器 / 设备 / 截图
